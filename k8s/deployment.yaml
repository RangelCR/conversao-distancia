apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversao-distancia
spec:
  replicas: 8
  selector:
    matchLabels:
      app: convert
  template:
    metadata:
      labels:
        app: convert
    spec:
      containers:
      - name: conversao
        image: rangelcr/conversao-distancia
        env:
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: convert
spec:
  selector:
    app: convert
  type: NodePort
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30090
